name: Auto-generate README Links
on:
  push:
    branches:
      - main
    paths:
      - 'public/forms/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install lz-string

      - name: Update README
        run: node .github/scripts/generate-links.cjs

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update playground links [skip ci]"
          file_pattern: 'README.md'